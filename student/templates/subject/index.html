{% extends "base/base.html" %}

{% block maincontent %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Subject List</h2>
    <a href="{% url 'create-subject' %}" class="btn btn-primary">
        Add Subject
    </a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-bordered table-striped">
            <thead class="table-light">
                <tr>
                    <th>Name</th>
                </tr>
            </thead>
            <tbody>
                {% for subject in subjects %}
                <tr>
                    <td>{{ subject.name }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td class="text-center">No subjects available</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
